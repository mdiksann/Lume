name: lume
description: "Lume — AI-Powered Book Tracking Application"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.1
  bloc: ^9.1.1
  bloc_concurrency: ^0.3.0
  equatable: ^2.0.8

  # Local Storage
  hive_ce: ^2.7.0
  hive_ce_flutter: ^2.3.4

  # Networking
  http: ^1.2.0

  # Typography
  google_fonts: ^8.1.0

  # Notifications
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.0

  # Utilities
  path_provider: ^2.1.0
  uuid: ^4.5.1
  intl: ^0.20.2
  cached_network_image: ^3.4.1

  # Environment
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  hive_ce_generator: ^1.6.0

flutter:
  uses-material-design: true
  assets:
    - assets/Logo2.png
    - .env
